name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do? Why is the current behavior limiting?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it working (UI, CLI, packaging, …)
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or other tools you already use
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Scope note: kAppIcon stays **user-level** (no root). Features that need system-wide package changes are out of scope.
